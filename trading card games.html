<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deck List</title>
  <style>
    body {
      background-color: red;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    header {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-top: 20px;
    }

    table {
      background-color: aquamarine;
      border-collapse: collapse;
      width: 80%;
    }

    th,
    td {
      padding: 10px;
      text-align: left;
      border: 1px solid black;
    }

    th {
      background-color: lightblue;
    }

    footer {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    footer a {
      font-size: 18px;
      text-decoration: none;
      color: black;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <header>
    <table>
      <tr>
        <th>Decks</th>
        <th>Deck Nation</th>
      </tr>
      <tr>
        <td>Krysrain</td>
        <td>Lyrical Monestario</td>
      </tr>
      <tr>
        <td>Heartluru</td>
        <td>Dark States</td>
      </tr>
      <tr>
        <td>Vrygilia</td>
        <td>Dragon Empire</td>
      </tr>
    </table>
  </header>

  <footer>
    <a href="Project 1.html">Return to Main Page</a>
  </footer>
</body>

</html>
